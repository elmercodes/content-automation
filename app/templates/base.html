<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | {{ settings.app_name }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='styles.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Local-First Python Application</p>
        <h1>{{ settings.app_name }}</h1>
        <p class="lede">
          Server-rendered publishing workflow foundation with no JavaScript
          frontend.
        </p>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
